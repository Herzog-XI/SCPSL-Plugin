name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET Framework
      uses: microsoft/setup-msbuild@v2
    
    - name: Restore NuGet packages
      run: nuget restore AntiSpawnTK/AntiSpawnTK.csproj
    
    - name: Build with MSBuild
      run: msbuild AntiSpawnTK/AntiSpawnTK.csproj /p:Configuration=Release /p:Platform="Any CPU"
    
    - name: Upload DLL to Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./AntiSpawnTK/bin/Release/net48/AntiSpawnTK.dll
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          Automated build from commit ${{ github.sha }}
          
          Download the DLL below and place it in your plugins folder.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
