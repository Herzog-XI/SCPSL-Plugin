name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET Framework
      uses: microsoft/setup-msbuild@v1
    
    - name: Restore NuGet packages
      run: nuget restore AntiSpawnTK/AntiSpawnTK.csproj
    
    - name: Build with MSBuild
      run: msbuild AntiSpawnTK/AntiSpawnTK.csproj /p:Configuration=Release /p:Platform="Any CPU"
    
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        body: |
          Automated build from commit ${{ github.sha }}
          
          Download the DLL below and place it in your plugins folder.
        draft: false
        prerelease: false
    
    - name: Upload DLL to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./AntiSpawnTK/bin/Release/AntiSpawnTK.dll
        asset_name: AntiSpawnTK.dll
        asset_content_type: application/octet-stream
